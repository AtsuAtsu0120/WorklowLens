services:
  server:
    image: golang:1.25
    working_dir: /app
    command: go run ./cmd/server
    environment:
      STORE_DRIVER: sqlite
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./workflow_lens_server:/app:ro
      - server-data:/data

  # monitoring プロファイル:
  #   docker compose --profile monitoring up
  postgres:
    profiles: ["monitoring"]
    image: postgres:16
    environment:
      POSTGRES_USER: workflowlens
      POSTGRES_PASSWORD: workflowlens
      POSTGRES_DB: workflowlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflowlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  server-pg:
    profiles: ["monitoring"]
    image: golang:1.25
    working_dir: /app
    command: ["go", "run", "-tags", "postgres", "./cmd/server"]
    environment:
      STORE_DRIVER: pgx
      DATABASE_URL: postgres://workflowlens:workflowlens@postgres:5432/workflowlens?sslmode=disable
      PORT: "8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: workflow_lens_server
    ports:
      - "8081:8080"
    volumes:
      - ./workflow_lens_server:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  otel-collector:
    profiles: ["monitoring"]
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus メトリクスエンドポイント
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana-oss:latest
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  server-data:
  pgdata:
