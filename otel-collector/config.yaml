# OpenTelemetry Collector 設定
# WorkflowLensのGoコンポーネントからOTLPでテレメトリを受信し、
# Prometheusエンドポイントとしてメトリクスを公開する。

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s

exporters:
  # デバッグ出力（コンソールログ）
  debug:
    verbosity: detailed

  # Prometheusエンドポイント（Grafana等からスクレイプ可能）
  prometheus:
    endpoint: 0.0.0.0:8889

  # === 追加バックエンド接続例 ===
  # 使用するバックエンドに応じてコメントを外し、
  # service.pipelines のexportersに追加してください。

  # Jaeger (OTLP対応、v2推奨):
  # otlp/jaeger:
  #   endpoint: jaeger:4317
  #   tls:
  #     insecure: true

  # Grafana Tempo:
  # otlp/tempo:
  #   endpoint: tempo:4317
  #   tls:
  #     insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
